<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Make your world a small town" />
    <title>Webook - Sign Up</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="container">
      <form class="signup-card">
        <header class="card-header">
          <div class="header-bis">
            <h1>Sign Up</h1>
            <button id="toggle" type="button">
              <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
          </div>
          <h2>Hello! Let's join us</h2>
        </header>

        <div class="form-content">
          <input type="email" placeholder="Email" />
          <input type="password" placeholder="Password" />
          <input type="password" placeholder="Confirm Password" />
        </div>

        <div class="form-actions">
          <div class="policy-check">
            <input type="checkbox" id="check" />
            <label for="check"
              >I agree with <a href="google">Privacy Policy</a></label
            >
          </div>
          <button type="submit" class="btn">SIGN UP</button>
        </div>

        <footer class="card-footer">
          <p>Already have an account? <a href="singup.html">Log In</a></p>
        </footer>
      </form>
    </main>
    <script>
      let btn = document.getElementById("toggle");
      let icon = document.getElementById("theme-icon");

      if (btn && icon) {
        btn.onclick = function () {
          document.body.classList.toggle("dark");

          if (document.body.classList.contains("dark")) {
            icon.classList.replace("fa-moon", "fa-sun");
          } else {
            icon.classList.replace("fa-sun", "fa-moon");
          }
        };
      }
    </script>
  </body>
</html>
